<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Wave of Hormuz — panel (10 HP = 50.8 × 128.5 mm)

  Waveform: 2 cycles of the conflict square wave (Oct 2023 – Apr 2025).
    OPEN=HIGH (+1), CLOSED=LOW (−1).
    Closure event at 33.6 % of cycle (Apr 13 2024), width exaggerated for
    visibility (actual 3.9 %, shown ~13 % so the notch is readable at panel scale).

  Layout (mm, Y from top):
    0–17.5  title + waveform
    17.5    wavy divider
    18.5–33 KNOT SPEED
    33.5    divider
    34–57   row 1  OPENING CEREMONY · STRAIT JACKET
    57.5    divider
    58–77   row 2  OIL SLICK · CHOKE POINT
    77.5    divider
    78–95   row 3  PERSIAN TILT · TANKER
    95.5    divider
    96–105  GULF / DRY
    105.5   I/O bar
    106–128 jacks

  Colour palette:
    #0e1f2e / #07121b  panel gradient
    #06101a            side rails
    #0d2435            title / section tint
    #e8c034            gold  (title, waveform)
    #3aa898            teal  (accent, wave decoration, waveform fill, PASSAGE)
    #8ecfcf            light teal  (primary knob labels)
    #5a8a9a            muted teal  (secondary labels, jack labels)
    #2a5060            knob halo border
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="50.8mm" height="128.5mm"
     viewBox="0 0 50.8 128.5">

  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="128.5"
        gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0e1f2e"/>
      <stop offset="100%" stop-color="#07121b"/>
    </linearGradient>
  </defs>

  <!-- ── Background ────────────────────────────────────────────────── -->
  <rect width="50.8" height="128.5" fill="url(#panelBg)"/>
  <rect x="0"    y="0" width="2.0" height="128.5" fill="#06101a"/>
  <rect x="48.8" y="0" width="2.0" height="128.5" fill="#06101a"/>

  <!-- ── Title area ─────────────────────────────────────────────────── -->
  <rect x="2.0" y="0" width="46.8" height="17.5" fill="#0d2435" rx="0.3"/>

  <text x="25.4" y="6.4"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="3.4" font-weight="bold"
        fill="#e8c034" letter-spacing="0.4">THE WAVE OF HORMUZ</text>

  <!-- ── Waveform graphic (2 cycles, opening=0.1, width=0.70) ──────── -->
  <!--
    Display box: x=3.5–47.3, y=8.5–15.5  (43.8 mm wide, 7 mm tall)
    Each cycle  = 21.9 mm
    Cycle x-offsets: C1 starts at 3.5, C2 starts at 25.4

    Per cycle:
      inactive (0→0.10):  2.19 mm flat at floor (y=15.0)
      active   (0.10→0.80): 15.33 mm ramp floor→peak (y=15.0→9.2)
      inactive (0.80→1.0):  4.38 mm flat at floor

    Key x coords:
      C1 ramp-start = 3.5  + 2.19 = 5.69
      C1 ramp-end   = 3.5  + 17.52 = 21.02
      C2 ramp-start = 25.4 + 2.19 = 27.59
      C2 ramp-end   = 25.4 + 17.52 = 42.92
  -->
  <rect x="3.5" y="8.5" width="43.8" height="7.0"
        fill="#060f18" rx="0.4"/>

  <!-- Floor reference line (subtle) -->
  <line x1="3.5" y1="15.0" x2="47.3" y2="15.0"
        stroke="#1c3545" stroke-width="0.25"/>

  <!--
    2 cycles, each 21.9 mm wide (x: 3.5–25.4, 25.4–47.3).
    Closure notch starts at 33.6 % = 7.36 mm into each cycle,
    shown 2.85 mm wide (~13 %) so it is readable.
      Cycle 1: high 3.5–10.86, notch 10.86–13.71, high 13.71–25.4
      Cycle 2: high 25.4–32.76, notch 32.76–35.61, high 35.61–47.3
  -->

  <!-- OPEN regions: teal fill (high = open = good) -->
  <rect x="3.50"  y="9.2" width="7.36"  height="5.8" fill="#3aa898" opacity="0.18"/>
  <rect x="13.71" y="9.2" width="11.69" height="5.8" fill="#3aa898" opacity="0.18"/>
  <rect x="25.40" y="9.2" width="7.36"  height="5.8" fill="#3aa898" opacity="0.18"/>
  <rect x="35.61" y="9.2" width="11.69" height="5.8" fill="#3aa898" opacity="0.18"/>

  <!-- CLOSED regions: danger red fill (low = closed = blockade) -->
  <rect x="10.86" y="9.2" width="2.85" height="5.8" fill="#c03030" opacity="0.35"/>
  <rect x="32.76" y="9.2" width="2.85" height="5.8" fill="#c03030" opacity="0.35"/>

  <!-- Waveform polyline: HIGH start, notch down, back up (×2 cycles) -->
  <polyline
    points="3.5,9.2  10.86,9.2  10.86,15.0  13.71,15.0  13.71,9.2
             32.76,9.2  32.76,15.0  35.61,15.0  35.61,9.2  47.3,9.2"
    stroke="#e8c034" stroke-width="0.65" fill="none" stroke-linejoin="miter"/>

  <!-- CLO / OPN tick markers at notch edges -->
  <line x1="10.86" y1="9.2" x2="10.86" y2="15.5"
        stroke="#c03030" stroke-width="0.35" stroke-dasharray="0.6,0.5"/>
  <line x1="13.71" y1="9.2" x2="13.71" y2="15.5"
        stroke="#3aa898" stroke-width="0.35" stroke-dasharray="0.6,0.5"/>
  <line x1="32.76" y1="9.2" x2="32.76" y2="15.5"
        stroke="#c03030" stroke-width="0.35" stroke-dasharray="0.6,0.5"/>
  <line x1="35.61" y1="9.2" x2="35.61" y2="15.5"
        stroke="#3aa898" stroke-width="0.35" stroke-dasharray="0.6,0.5"/>

  <!-- Decorative wave divider under title -->
  <path d="M2,17.5 C6.5,15.2 10,19.5 14,17.5 C18,15.2 21.5,19.5 25.4,17.5
           C29.3,15.2 32.8,19.5 36.8,17.5 C40.8,15.2 44.5,19.5 48.8,17.5"
        stroke="#3aa898" stroke-width="0.7" fill="none" opacity="0.75"/>

  <!-- ── KNOT SPEED ────────────────────────────────────────────────── -->
  <circle cx="25.4" cy="24.0" r="8.0"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.8"/>

  <text x="25.4" y="19.3"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.5" font-weight="bold" fill="#8ecfcf">KNOT SPEED</text>

  <!-- secondary: freq range indicator either side of knob -->
  <text x="6.0" y="24.6"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.8" fill="#3a6878">−4<tspan font-size="1.4">OCT</tspan></text>
  <text x="44.8" y="24.6"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.8" fill="#3a6878">+4<tspan font-size="1.4">OCT</tspan></text>

  <!-- Divider -->
  <line x1="4" y1="33.5" x2="46.8" y2="33.5"
        stroke="#1c3a4a" stroke-width="0.5"/>

  <!-- ── ROW 1: OPENING CEREMONY  ·  STRAIT JACKET ─────────────────── -->
  <circle cx="12.7" cy="48.0" r="5.2"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>
  <circle cx="38.1" cy="48.0" r="5.2"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>

  <!-- labels above -->
  <text x="12.7" y="39.2"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">OPENING</text>
  <text x="12.7" y="42.3"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">CEREMONY</text>

  <text x="38.1" y="39.2"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">STRAIT</text>
  <text x="38.1" y="42.3"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">JACKET</text>

  <!-- labels below -->
  <text x="12.7" y="55.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.9" fill="#5a8a9a">phase offset</text>
  <text x="38.1" y="55.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.9" fill="#5a8a9a">duty cycle</text>

  <!-- Divider -->
  <line x1="4" y1="57.5" x2="46.8" y2="57.5"
        stroke="#1c3a4a" stroke-width="0.5"/>

  <!-- ── ROW 2: OIL SLICK  ·  CHOKE POINT ─────────────────────────── -->
  <circle cx="12.7" cy="68.0" r="5.2"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>
  <circle cx="38.1" cy="68.0" r="5.2"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>

  <!-- labels above -->
  <text x="12.7" y="59.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">OIL SLICK</text>

  <text x="38.1" y="59.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">CHOKE</text>
  <text x="38.1" y="62.6"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">POINT</text>

  <!-- labels below -->
  <text x="12.7" y="75.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.9" fill="#5a8a9a">slew / LP</text>
  <text x="38.1" y="75.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.9" fill="#5a8a9a">tanh drive</text>

  <!-- Divider -->
  <line x1="4" y1="77.5" x2="46.8" y2="77.5"
        stroke="#1c3a4a" stroke-width="0.5"/>

  <!-- ── ROW 3: PERSIAN TILT  ·  TANKER ────────────────────────────── -->
  <circle cx="12.7" cy="88.0" r="5.2"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>
  <circle cx="38.1" cy="88.0" r="5.2"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>

  <!-- labels above -->
  <text x="12.7" y="79.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">PERSIAN</text>
  <text x="12.7" y="82.6"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">TILT</text>

  <text x="38.1" y="79.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold" fill="#8ecfcf">TANKER</text>

  <!-- labels below (tight — 1.8 pt) -->
  <text x="12.7" y="94.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.8" fill="#5a8a9a">saw ↔ tri</text>
  <text x="38.1" y="94.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.8" fill="#5a8a9a">amplitude</text>

  <!-- Divider -->
  <line x1="4" y1="95.5" x2="46.8" y2="95.5"
        stroke="#1c3a4a" stroke-width="0.5"/>

  <!-- ── GULF / DRY ──────────────────────────────────────────────────── -->
  <circle cx="25.4" cy="101.0" r="3.8"
          fill="#0c1e2c" stroke="#2a5060" stroke-width="0.6"/>

  <text x="25.4" y="97.3"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.3" font-weight="bold" fill="#8ecfcf">GULF / DRY</text>

  <!-- wet / dry end caps -->
  <text x="11.0" y="101.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.8" fill="#3a6878">DRY</text>
  <text x="39.8" y="101.5"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.8" fill="#3a6878">WET</text>

  <!-- ── I/O Section ────────────────────────────────────────────────── -->
  <rect x="2.0" y="105.5" width="46.8" height="23.0"
        fill="#070e18" rx="0.3"/>
  <line x1="2.0" y1="105.5" x2="48.8" y2="105.5"
        stroke="#3aa898" stroke-width="0.6" opacity="0.8"/>

  <!-- Input jack halos (y = 111) -->
  <circle cx=" 7.62" cy="111" r="2.8"
          fill="#0c1e2c" stroke="#1e4050" stroke-width="0.5"/>
  <circle cx="17.78" cy="111" r="2.8"
          fill="#0c1e2c" stroke="#1e4050" stroke-width="0.5"/>
  <circle cx="27.94" cy="111" r="2.8"
          fill="#0c1e2c" stroke="#1e4050" stroke-width="0.5"/>
  <circle cx="38.10" cy="111" r="2.8"
          fill="#0c1e2c" stroke="#1e4050" stroke-width="0.5"/>

  <!-- Output jack halos (y = 121) -->
  <circle cx=" 7.62" cy="121" r="2.8"
          fill="#0c1e2c" stroke="#1e4050" stroke-width="0.5"/>
  <circle cx="43.18" cy="121" r="3.0"
          fill="#0c1e2c" stroke="#2a6050" stroke-width="0.8"/>

  <!-- Input labels (above jacks) -->
  <text x=" 7.62" y="107.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.1" fill="#5a8a9a">V/OCT</text>
  <text x="17.78" y="107.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.1" fill="#5a8a9a">TIDE</text>
  <text x="27.94" y="107.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.1" fill="#5a8a9a">SWELL</text>
  <text x="38.10" y="107.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.1" fill="#5a8a9a">OPEN</text>

  <!-- Input secondary labels (below jacks) -->
  <text x=" 7.62" y="116.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.7" fill="#3a6878">pitch</text>
  <text x="17.78" y="116.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.7" fill="#3a6878">sync</text>
  <text x="27.94" y="116.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.7" fill="#3a6878">fm</text>
  <text x="38.10" y="116.2" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.7" fill="#3a6878">cv</text>

  <!-- Output labels -->
  <text x=" 7.62" y="126.0" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.1" fill="#5a8a9a">EOC</text>
  <text x="43.18" y="126.0" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.2" font-weight="bold"
        fill="#3aa898">PASSAGE</text>

  <!-- Output secondary labels -->
  <text x=" 7.62" y="119.5" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.7" fill="#3a6878">trig</text>
  <text x="43.18" y="119.5" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="1.7" fill="#3a6878">audio</text>

  <!-- Subtle bottom wave decoration -->
  <path d="M2,126.5 C6.5,124.5 10,128 14,126.5
           C18,124.5 21.5,128 25.4,126.5
           C29.3,124.5 32.8,128 36.8,126.5
           C40.8,124.5 44.5,128 48.8,126.5"
        stroke="#3aa898" stroke-width="0.4" fill="none" opacity="0.35"/>

</svg>
